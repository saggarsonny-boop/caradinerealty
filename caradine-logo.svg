<svg width="610" height="170" viewBox="0 -8 610 178" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">Caradine Realty and Development L.L.C.</title>
  <desc id="logo-desc">Caradine Realty and Development logo: ornate green calligraphic C with large outer swash loop, gold-and-green sunburst above the wordmark, and a gold serif wordmark.</desc>
  <defs>
    <linearGradient id="gld" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F7DC6A"/>
      <stop offset="42%"  stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#8C6208"/>
    </linearGradient>
    <linearGradient id="grn" x1="0.2" y1="0" x2="0.8" y2="1">
  <stop offset="0%"   stop-color="#D4A820"/>
  <stop offset="30%"  stop-color="#3AAB28"/>
  <stop offset="100%" stop-color="#0B4A18"/>
    </linearGradient>
    <linearGradient id="drp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FAE84C"/>
      <stop offset="100%" stop-color="#C49A10"/>
    </linearGradient>
  </defs>

  <!-- OUTER SWASH: large italic oval — extends clearly BEYOND and ABOVE
   the C body. Starts near top C-opening, sweeps up-and-left in a wide
   arc well outside the C bowl, curves around, returns right side. -->
  <path d="M 168,30
       C 148,4   106,-6   64,10
       C 20,28    4,68   14,106
       C 24,144   60,166 100,163
       C 136,160 165,144 178,120
       C 188,100  185,76  170,58"
    stroke="#1B7A2C" stroke-width="2.6" fill="none" stroke-linecap="round"/>

  <!-- MAIN C BODY: bold filled calligraphic C with thick-thin variation -->
  <path d="M 158,28
       C 128,10  90,4   62,18
       C 24,36    8,68  10,96
       C 12,124  32,148  64,158
       C 84,164 110,162 130,150
       C 146,140 156,124 151,110
       L 141,122
       C 132,134 113,142  95,140
       C 68,136  52,118  52,94
       C 52,70   70,48   94,40
       C 114,32  137,36  151,52 Z"
    fill="url(#grn)" stroke="#093D14" stroke-width="0.9"/>

  <!-- TOP TERMINAL FLOURISH: delicate curl from crown of the C -->
  <path d="M 158,28 C 166,15 181,11 188,20"
    stroke="#1C8030" stroke-width="2.6" fill="none" stroke-linecap="round"/>

  <!-- INNER OVAL: calligraphic counter detail inside C bowl -->
  <ellipse cx="86" cy="84" rx="24" ry="32"
       transform="rotate(-9,86,84)"
       stroke="#6DCF7C" stroke-width="1.6" fill="none" opacity="0.55"/>

  <!-- SUNBURST: rays from (358,26), above the D/I in ARADINE.
   ARADINE at x=192: A≈48 R≈46 A≈48 = 142 → D starts at 334,
   D≈48 → I at 382. Midpoint = 358. -->
  <g stroke="#1A8035" stroke-linecap="round">
    <line x1="358" y1="26" x2="358" y2="0"  stroke-width="2.8"/>
    <line x1="358" y1="26" x2="339" y2="2"  stroke-width="2.2"/>
    <line x1="358" y1="26" x2="322" y2="8"  stroke-width="2.0"/>
    <line x1="358" y1="26" x2="309" y2="17" stroke-width="1.8"/>
    <line x1="358" y1="26" x2="301" y2="29" stroke-width="1.6"/>
    <line x1="358" y1="26" x2="302" y2="43" stroke-width="1.4"/>
    <line x1="358" y1="26" x2="311" y2="56" stroke-width="1.3"/>
    <line x1="358" y1="26" x2="324" y2="64" stroke-width="1.2"/>
    <line x1="358" y1="26" x2="377" y2="2"  stroke-width="2.2"/>
    <line x1="358" y1="26" x2="394" y2="8"  stroke-width="2.0"/>
    <line x1="358" y1="26" x2="407" y2="17" stroke-width="1.8"/>
    <line x1="358" y1="26" x2="415" y2="29" stroke-width="1.6"/>
    <line x1="358" y1="26" x2="414" y2="43" stroke-width="1.4"/>
    <line x1="358" y1="26" x2="405" y2="56" stroke-width="1.3"/>
    <line x1="358" y1="26" x2="392" y2="64" stroke-width="1.2"/>
  </g>

  <!-- TEARDROP: gold droplet at sunburst focal point -->
  <path d="M 358,22 C 347,37 345,57 358,72 C 371,57 369,37 358,22 Z"
    fill="url(#drp)" stroke="#9E6E0C" stroke-width="1.2"/>

  <!-- WORDMARK: stylized C + ARADINE reads as CARADINE -->
  <text x="192" y="108"
    font-family="'Palatino Linotype','Book Antiqua',Palatino,Georgia,'Times New Roman',serif"
    font-size="66" font-weight="bold" letter-spacing="2"
    fill="url(#gld)">ARADINE</text>

  <!-- SUBTITLE: centered under full composition (mid ≈ 258) -->
  <text x="258" y="138" text-anchor="middle"
    font-family="'Palatino Linotype','Book Antiqua',Palatino,Georgia,'Times New Roman',serif"
    font-size="21" font-style="italic"
    fill="#1C1C1C">Realty &amp; Development L.L.C.</text>
</svg>